<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        *{
            font-family: arial;
            vertical-align: middle;
        }
        div{
            box-shadow: 0px 0px 4px gray;
            width: 30%;
            padding: 10px;
            border-radius: 6px;
        }
        img{
            width: 30px;
            border-radius: 25px;
            vertical-align: bottom;
            border: 1px solid gray;
        }
        input{
            border: none;
            vertical-align: middle;
        }
        button{
            border: none;
            border-radius: 20px;
            padding: 6px;
            background-color: skyblue;
            color: white;
            width: 65px;
        }
    </style>
    <div>
        <img src="download.webp" alt="">
        <input type="text" placeholder="What's happening?">
        <button>Tweet</button>
    </div>
</body>
</html>
