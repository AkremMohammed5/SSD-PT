<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        button{
            background-color: green;
            color: white;
            border: none;
            cursor: pointer;
            padding-top: 10px;
            padding-bottom: 10px;

            padding-left: 15px;
            padding-right: 15px;
            margin-right: 10px;
            margin-left: 10px;

            transition: padding 0.15s, margin 0.15s;
        }
        button:hover{
            padding-left: 25px;
            padding-right: 25px;
            margin-right: 0px;
            margin-left: 0px;
        }
    </style>
    <button>One</button>
    <button>Two</button>
    <button>Three</button>
</body>
</html>
