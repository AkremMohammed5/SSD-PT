<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        .b1{
            background-color: darkmagenta;
            color: white;
            border: none;
            height: 42px;
            width: 160px;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.20s;
        }
        .b1:hover{
            background-color: purple;
        }
        .b2{
            background-color: white;
            color: gray;
            border-style: solid;
            border-color: gray;
            height: 42px;
            width: 160px;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.20s, color 0.15s;
        }
        .b2:hover{
            background-color: gray;
            color: white;
        }
    </style>
    <h1>2d. Bootstrap</h1>
    <button class="b1">
        Get started
    </button>
    <button class="b2">
        Downlord
    </button>
</body>
</html>
