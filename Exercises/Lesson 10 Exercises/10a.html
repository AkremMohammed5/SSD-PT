<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        .div1{
            width: 50%;
            box-shadow: 0px 0px 10px gray;
        }
        .div2{
            display: inline-block;
        }
        img{
            border-radius: 500px;
            width: 60px;
            margin-left: 15px;
            margin-right: 15px;
        }
        .div3{
            display: inline-block;
            margin-right: 200px;
        }
        p{
            line-height: 6px;
            margin-top: 14px;
            margin-bottom: 0;
        }
        .pb{
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 600;
        }
        .pg{
            font-family: Arial, Helvetica, sans-serif;
            font-size: 14px;
            color: rgb(96, 96, 96);
        }
        .div4{
            display: inline-block;
        }
        button{
            background-color: rgb(64, 186, 235);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
        }
    </style>
    <div class="div1">
        <div class="div2">
            <img src="download.webp" alt="">
        </div>
        <div class="div3">
            <p class="pb">Ducky</p>
            <p class="pg">The duck</p>
            <p class="pg">Popular</p>
        </div>
        <div class="div4">
            <button>Follow</button>
        </div>
    </div>
</body>
</html>
