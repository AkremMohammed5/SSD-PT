<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        a{
            color: cyan;
            font-size: large;
            cursor: pointer;
        }
        a:hover{
            color: orangered;
        }
        .p1{
            color: green;
            font-weight: 600;
        }
        .b1{
            background-color: yellow;
            border: none;
            border-radius: 24px;
            height: 42px;
            width: 128px;
            cursor: pointer;
            transition: opacity 0.15s;
        }
        .b1:hover{
            opacity: 0.9;
            box-shadow: 2px 2px 6px black;
        }
        .b1:active{
            background-color: darkorange;
        }
        .b2{
            background-color: orange;
            border: none;
            border-radius: 24px;
            height: 42px;
            width: 128px;
            cursor: pointer;
            transition: opacity 0.15s;
        }
        .b2:hover{
            opacity: 0.9;
            box-shadow: 2px 2px 6px black;
        }
        .b2:active{
            background-color: orangered;
        }
    </style>
    <a href="amozon">Back to Amazon</a>
    <h1>Nike Black Running Shoes</h1>
    <p class="p1">$39 - in stock</p>
    <p>Free delivery tommorrow.</p>
    <button class="b1">Add to Cart</button>
    <button class="b2">Buy now</button>
</body>
</html>
