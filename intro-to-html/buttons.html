<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
    .Subscribe{
        background-color: red;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 2px;
        cursor: pointer;
        margin-right: 8px;
    }
    .Join{
        background-color: white;
        color: skyblue;
        border-color: skyblue;
        border-radius: 2px;
        border-width: 1px;
        border-style: solid;
        padding: 8px 16px;
        cursor: pointer;
        margin-right: 4px;
    }
    .Tweet{
        background-color: royalblue;
        color: white;
        border-radius: 18px;
        border: none;
        border-style: solid;
        padding: 8px 16px;
        cursor: pointer;
        font-size: 15px;
        font-weight: bold;
        margin-left: 4px;
    }
</style>



<button class="Subscribe">Subscribe</button>
<button class="Join">Join</button>
<button class="Tweet">Tweet</button>
</body>
</html>
