<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        .b1{
            background-color: royalblue;
            color: white;
            border: none;
            height: 42px;
            width: 240px;
            border-radius: 42px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.15s;
        }
        .b1:hover{
            background-color: darkblue;
        }
        .b2{
            background-color: white;
            color: royalblue;
            border-style: solid;
            border-color: royalblue;
            height: 42px;
            width: 72px;
            border-radius: 42px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.15s, border-width 0.15s;
        }
        .b2:hover{
            background-color: lightskyblue;
            border-width: 3px;
        }
    </style>
    <h1>2e. LinkedIn</h1>
    <button class="b1">
        Apply on company website
    </button>
    <button class="b2">
        Save
    </button>
</body>
</html>
